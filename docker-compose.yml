services:
  app:
    build:
      context: ./backend
    container_name: aucthux_laravel_app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    depends_on:
      - db

  # db:
  #   image: mysql:8
  #   container_name: aucthux_mysql_db
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: ticketing_db
  #   ports:
  #     - "3307:3306"

  db:
    image: postgres:16
    container_name: aucthux_postgres_db
    restart: always
    environment:
      POSTGRES_DB: ticketing_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
    container_name: aucthux_next_app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      -  /app/node_modules
    working_dir: /app  
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --webpack --port 3000"

volumes:
  db_data:
  node_modules: